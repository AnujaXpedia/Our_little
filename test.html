<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Function Test v2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fafaf8; max-width: 500px; margin: 0 auto; }
    button { width: 100%; padding: 14px; font-size: 15px; cursor: pointer; border: 1px solid #333; border-radius: 8px; background: #fff; margin-bottom: 12px; }
    button:hover { background: #f0f0f0; }
    #log { background: #111; color: #ccc; font-family: monospace; font-size: 13px; padding: 1rem; border-radius: 8px; white-space: pre-wrap; min-height: 200px; margin-top: 1rem; }
    .ok { color: #7dff7d; } .err { color: #ff7d7d; } .info { color: #7db8ff; }
  </style>
</head>
<body>
  <h2>Edge Function Test v2</h2>
  <p style="font-size:13px;color:#666;margin-bottom:1.5rem;">Make sure you are signed in on the main site first, then run these steps in order.</p>

  <button onclick="checkSession()">Step 1 — Check I am logged in</button>
  <button onclick="pingDirect()">Step 2 — Ping function (direct fetch)</button>
  <button onclick="sendTestEmail()">Step 3 — Send test email to Ambika</button>

  <div id="log"></div>

<script>
  const SUPABASE_URL = 'https://dioxbtmvkonwgovpqdqx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpb3hidG12a29ud2dvdnBxZHF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2Nzg2MzcsImV4cCI6MjA5MDI1NDYzN30.7ZlAtTqpKvXWUNlTRwN4bcAB9V87eTfHaB-vNMXZKr0';
  const FUNCTION_URL = SUPABASE_URL + '/functions/v1/notify';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const logEl = document.getElementById('log');

  function log(msg, type) {
    const line = document.createElement('div');
    line.className = type || 'info';
    line.textContent = new Date().toLocaleTimeString() + '  ' + msg;
    logEl.appendChild(line);
  }

  async function getToken() {
    const { data: { session } } = await sb.auth.getSession();
    return session?.access_token || null;
  }

  async function callFunction(body) {
    const token = await getToken();
    if (!token) { log('Not logged in!', 'err'); return null; }
    const res = await fetch(FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify(body)
    });
    const text = await res.text();
    return { status: res.status, ok: res.ok, text };
  }

  async function checkSession() {
    log('Checking session...', 'info');
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      log('LOGGED IN as: ' + session.user.email, 'ok');
      log('Token (first 40 chars): ' + session.access_token.substring(0, 40) + '...', 'info');
    } else {
      log('NOT LOGGED IN', 'err');
      log('Go to https://anujaxpedia.github.io/Our_little/ first, sign in, then come back here', 'err');
    }
  }

  async function pingDirect() {
    log('Calling function with direct fetch + explicit auth header...', 'info');
    try {
      const result = await callFunction({ type: 'ping' });
      if (!result) return;
      log('HTTP Status: ' + result.status, result.ok ? 'ok' : 'err');
      log('Response: ' + result.text, result.ok ? 'ok' : 'err');
      if (result.ok) log('Function is reachable and working!', 'ok');
    } catch(e) {
      log('CORS or network error: ' + e.message, 'err');
      log('Fix: In Supabase dashboard, go to Edge Functions and make sure the function is deployed', 'err');
    }
  }

  async function sendTestEmail() {
    log('Sending test email to ambikabanerjee17@gmail.com...', 'info');
    try {
      const result = await callFunction({
        type: 'note',
        data: {
          fromName: 'Anuja',
          toName: 'Ambika',
          toEmail: 'ambikabanerjee17@gmail.com',
          message: 'Test email — if you can read this, email notifications are working!'
        }
      });
      if (!result) return;
      log('HTTP Status: ' + result.status, result.ok ? 'ok' : 'err');
      log('Response: ' + result.text, result.ok ? 'ok' : 'err');
      if (result.ok) {
        const parsed = JSON.parse(result.text);
        if (parsed.resend?.id) {
          log('Email sent! Resend ID: ' + parsed.resend.id, 'ok');
          log('Check ambikabanerjee17@gmail.com inbox and spam folder now', 'ok');
        } else if (parsed.resend?.name === 'validation_error') {
          log('Resend rejected: ' + JSON.stringify(parsed.resend), 'err');
          log('FIX: Your Resend API key may be wrong, or the sandbox does not allow this recipient', 'err');
        }
      }
    } catch(e) {
      log('Error: ' + e.message, 'err');
    }
  }

  // auto-check on load
  checkSession();
</script>
</body>
</html>
