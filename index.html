<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Little World</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --surface2: #f4f3f0;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --text-faint: #a0a09c;
      --accent: #c9b99a;
      --accent-bg: #f7f2ea;
      --success: #5a8a5a;
      --success-bg: #edf5ed;
      --radius-md: 10px;
      --radius-lg: 14px;
      --font: 'DM Sans', sans-serif;
      --font-serif: 'DM Serif Display', serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1e1b;
        --surface2: #272724;
        --border: rgba(255,255,255,0.09);
        --border-strong: rgba(255,255,255,0.18);
        --text: #f0ede8;
        --text-muted: #9a9892;
        --text-faint: #636360;
        --accent: #b8a485;
        --accent-bg: #2a2520;
        --success: #7aaa7a;
        --success-bg: #1a2a1a;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    .app {
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 0.5px solid var(--border);
    }
    .header h1 {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 13px;
      color: var(--text-faint);
      margin-top: 5px;
    }
    .header .date-chip {
      display: inline-block;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 4px 12px;
      border-radius: 99px;
      border: 0.5px solid var(--border);
    }

    /* Nav */
    .nav {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: var(--radius-lg);
      padding: 4px;
      margin-bottom: 2rem;
      border: 0.5px solid var(--border);
    }
    .nav-btn {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.18s;
    }
    .nav-btn.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 500;
      border: 0.5px solid var(--border-strong);
    }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .card-label {
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    /* Mood section */
    .mood-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1rem;
    }
    @media (max-width: 480px) {
      .mood-grid { grid-template-columns: 1fr; }
    }
    .partner-name {
      background: transparent;
      border: none;
      font-size: 15px;
      font-weight: 500;
      font-family: var(--font);
      color: var(--text);
      width: 100%;
      margin-bottom: 12px;
      outline: none;
      border-bottom: 0.5px solid transparent;
      transition: border-color 0.15s;
      padding-bottom: 2px;
    }
    .partner-name:focus { border-bottom-color: var(--accent); }

    .mood-emojis {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .mood-emojis button {
      width: 36px;
      height: 36px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      font-size: 17px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mood-emojis button:hover { border-color: var(--accent); }
    .mood-emojis button.selected {
      border: 1.5px solid var(--accent);
      background: var(--accent-bg);
    }
    .text-input {
      width: 100%;
      font-size: 13px;
      font-family: var(--font);
      color: var(--text);
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 11px;
      outline: none;
      transition: border-color 0.15s;
    }
    .text-input:focus { border-color: var(--accent); }
    textarea.text-input {
      min-height: 80px;
      resize: vertical;
      line-height: 1.6;
      font-size: 14px;
    }

    .save-btn {
      width: 100%;
      padding: 11px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .save-btn:hover { background: var(--surface2); }
    .save-btn:active { opacity: 0.7; }

    /* History */
    .history-section { margin-top: 1.75rem; }
    .history-section h3 {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }
    .history-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .history-row .h-day { min-width: 60px; font-size: 12px; color: var(--text-faint); }
    .history-row .h-moods { font-size: 18px; display: flex; gap: 4px; }
    .history-row .h-note { font-size: 12px; color: var(--text-muted); }

    /* Journal */
    .past-entry {
      border-left: 1.5px solid var(--accent);
      padding: 6px 0 6px 14px;
      margin-bottom: 14px;
    }
    .past-entry .e-date { font-size: 11px; color: var(--text-faint); margin-bottom: 4px; }
    .past-entry .e-text { font-size: 13px; color: var(--text-muted); line-height: 1.65; }
    .past-entry .e-improve {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 4px;
      font-style: italic;
    }

    /* Milestones */
    .milestone-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .milestone-item:hover { border-color: var(--border-strong); }
    .milestone-item.done { opacity: 0.6; }
    .m-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--success);
      transition: all 0.15s;
    }
    .milestone-item.done .m-check {
      background: var(--success-bg);
      border-color: var(--success);
    }
    .m-text { font-size: 14px; color: var(--text); }
    .milestone-item.done .m-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .add-row {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .add-row input { flex: 1; }
    .add-row button {
      padding: 9px 18px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .add-row button:hover { background: var(--surface2); }

    /* Love notes */
    .note-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .note-from {
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }
    .note-body {
      font-family: var(--font-serif);
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
    }
    .note-time { font-size: 11px; color: var(--text-faint); margin-top: 9px; }
    .sender-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .sender-row span { font-size: 12px; color: var(--text-muted); }
    .from-btn {
      padding: 6px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }
    .from-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--text);
      font-weight: 500;
    }
    .send-btn {
      margin-left: auto;
      padding: 7px 18px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s;
    }
    .send-btn:hover { background: var(--surface2); }
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      font-size: 13px;
      color: var(--text-faint);
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="header">
      <h1>our little world</h1>
      <p>a quiet space for the two of you</p>
      <div class="date-chip" id="today-date"></div>
    </div>

    <nav class="nav">
      <button class="nav-btn active" onclick="showTab('mood', this)">Mood</button>
      <button class="nav-btn" onclick="showTab('journal', this)">Journal</button>
      <button class="nav-btn" onclick="showTab('milestones', this)">Growth</button>
      <button class="nav-btn" onclick="showTab('notes', this)">Love notes</button>
    </nav>

    <!-- MOOD -->
    <div id="mood" class="section active">
      <div class="mood-grid">
        <div class="card">
          <div class="card-label">Partner 1</div>
          <input class="partner-name" id="name1" type="text" value="You" placeholder="Your name" />
          <div class="mood-emojis" id="moods1">
            <button onclick="selectMood(1,'😊')">😊</button>
            <button onclick="selectMood(1,'😌')">😌</button>
            <button onclick="selectMood(1,'😔')">😔</button>
            <button onclick="selectMood(1,'😤')">😤</button>
            <button onclick="selectMood(1,'🥰')">🥰</button>
            <button onclick="selectMood(1,'😴')">😴</button>
          </div>
          <input class="text-input" id="note1" type="text" placeholder="One word about today..." />
        </div>
        <div class="card">
          <div class="card-label">Partner 2</div>
          <input class="partner-name" id="name2" type="text" value="Partner" placeholder="Partner's name" />
          <div class="mood-emojis" id="moods2">
            <button onclick="selectMood(2,'😊')">😊</button>
            <button onclick="selectMood(2,'😌')">😌</button>
            <button onclick="selectMood(2,'😔')">😔</button>
            <button onclick="selectMood(2,'😤')">😤</button>
            <button onclick="selectMood(2,'🥰')">🥰</button>
            <button onclick="selectMood(2,'😴')">😴</button>
          </div>
          <input class="text-input" id="note2" type="text" placeholder="One word about today..." />
        </div>
      </div>
      <button class="save-btn" onclick="saveMood()">Save today's mood</button>
      <div class="history-section" id="mood-history"></div>
    </div>

    <!-- JOURNAL -->
    <div id="journal" class="section">
      <div class="card">
        <div class="card-label">What's on your mind lately?</div>
        <textarea class="text-input" id="journal-text" placeholder="Thoughts, feelings, things to explore together..."></textarea>
      </div>
      <div class="card">
        <div class="card-label">One thing to improve our relationship</div>
        <textarea class="text-input" id="improve-text" placeholder="A small habit, a conversation to have, something to try..."></textarea>
      </div>
      <button class="save-btn" onclick="saveJournal()">Save entry</button>
      <div class="history-section" id="journal-past"></div>
    </div>

    <!-- MILESTONES -->
    <div id="milestones" class="section">
      <div id="milestones-list"></div>
      <div class="add-row">
        <input class="text-input" id="milestone-input" type="text" placeholder="Add a growth goal or milestone..." />
        <button onclick="addMilestone()">Add</button>
      </div>
    </div>

    <!-- LOVE NOTES -->
    <div id="notes" class="section">
      <div class="card">
        <div class="card-label">Write a love note</div>
        <textarea class="text-input" id="note-text" placeholder="Something kind, appreciative, or just sweet..."></textarea>
        <div class="sender-row">
          <span>From:</span>
          <button class="from-btn active" id="from-btn-1" onclick="setFrom(1)">You</button>
          <button class="from-btn" id="from-btn-2" onclick="setFrom(2)">Partner</button>
          <button class="send-btn" onclick="sendNote()">Send note</button>
        </div>
      </div>
      <div id="notes-list"></div>
    </div>

  </div>

  <script>
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function fmt(ts) {
      const d = new Date(ts);
      return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
    }

    function load(key, def) {
      try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; }
    }
    function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    const state = {
      moods: load('olw_moods', []),
      journal: load('olw_journal', []),
      milestones: load('olw_milestones', [
        { id: 1, text: 'Have a weekly check-in conversation', done: false },
        { id: 2, text: 'Try a new activity together', done: false },
        { id: 3, text: 'Write down 3 things we appreciate about each other', done: false }
      ]),
      notes: load('olw_notes', []),
      selected: { 1: null, 2: null },
      noteFrom: 1
    };

    document.getElementById('today-date').textContent = fmt(Date.now());

    function showTab(id, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function selectMood(p, emoji) {
      state.selected[p] = emoji;
      document.querySelectorAll('#moods' + p + ' button').forEach(b => {
        b.classList.toggle('selected', b.textContent === emoji);
      });
    }

    function saveMood() {
      const entry = {
        ts: Date.now(),
        name1: document.getElementById('name1').value || 'You',
        name2: document.getElementById('name2').value || 'Partner',
        mood1: state.selected[1] || '–',
        mood2: state.selected[2] || '–',
        note1: document.getElementById('note1').value,
        note2: document.getElementById('note2').value
      };
      state.moods.unshift(entry);
      if (state.moods.length > 30) state.moods = state.moods.slice(0, 30);
      save('olw_moods', state.moods);
      document.getElementById('note1').value = '';
      document.getElementById('note2').value = '';
      state.selected = { 1: null, 2: null };
      document.querySelectorAll('.mood-emojis button').forEach(b => b.classList.remove('selected'));
      renderMoods();
    }

    function renderMoods() {
      const el = document.getElementById('mood-history');
      if (!state.moods.length) { el.innerHTML = ''; return; }
      el.innerHTML = '<h3>Recent days</h3>' + state.moods.slice(0, 10).map(e =>
        `<div class="history-row">
          <span class="h-day">${fmt(e.ts)}</span>
          <span class="h-moods">${e.mood1}${e.mood2}</span>
          <span class="h-note">${[e.note1, e.note2].filter(Boolean).join(' · ')}</span>
        </div>`
      ).join('');
    }

    function saveJournal() {
      const t = document.getElementById('journal-text').value.trim();
      const i = document.getElementById('improve-text').value.trim();
      if (!t && !i) return;
      state.journal.unshift({ ts: Date.now(), thoughts: t, improve: i });
      if (state.journal.length > 30) state.journal = state.journal.slice(0, 30);
      save('olw_journal', state.journal);
      document.getElementById('journal-text').value = '';
      document.getElementById('improve-text').value = '';
      renderJournal();
    }

    function renderJournal() {
      const el = document.getElementById('journal-past');
      if (!state.journal.length) { el.innerHTML = ''; return; }
      el.innerHTML = '<h3>Past entries</h3>' + state.journal.slice(0, 8).map(e =>
        `<div class="past-entry">
          <div class="e-date">${fmt(e.ts)}</div>
          ${e.thoughts ? `<div class="e-text">${e.thoughts}</div>` : ''}
          ${e.improve ? `<div class="e-improve">To improve: ${e.improve}</div>` : ''}
        </div>`
      ).join('');
    }

    function addMilestone() {
      const val = document.getElementById('milestone-input').value.trim();
      if (!val) return;
      state.milestones.push({ id: Date.now(), text: val, done: false });
      save('olw_milestones', state.milestones);
      document.getElementById('milestone-input').value = '';
      renderMilestones();
    }

    function toggleMilestone(id) {
      const m = state.milestones.find(m => m.id === id);
      if (m) m.done = !m.done;
      save('olw_milestones', state.milestones);
      renderMilestones();
    }

    function renderMilestones() {
      const el = document.getElementById('milestones-list');
      if (!state.milestones.length) { el.innerHTML = '<div class="empty-state">No goals yet — add your first one below</div>'; return; }
      el.innerHTML = state.milestones.map(m =>
        `<div class="milestone-item ${m.done ? 'done' : ''}" onclick="toggleMilestone(${m.id})">
          <div class="m-check">${m.done ? '✓' : ''}</div>
          <div class="m-text">${m.text}</div>
        </div>`
      ).join('');
    }

    function setFrom(n) {
      state.noteFrom = n;
      const n1 = document.getElementById('name1').value || 'You';
      const n2 = document.getElementById('name2').value || 'Partner';
      document.getElementById('from-btn-1').textContent = n1;
      document.getElementById('from-btn-2').textContent = n2;
      document.getElementById('from-btn-1').classList.toggle('active', n === 1);
      document.getElementById('from-btn-2').classList.toggle('active', n === 2);
    }

    function sendNote() {
      const text = document.getElementById('note-text').value.trim();
      if (!text) return;
      const n1 = document.getElementById('name1').value || 'You';
      const n2 = document.getElementById('name2').value || 'Partner';
      state.notes.unshift({
        ts: Date.now(),
        from: state.noteFrom === 1 ? n1 : n2,
        text
      });
      save('olw_notes', state.notes);
      document.getElementById('note-text').value = '';
      renderNotes();
    }

    function renderNotes() {
      const el = document.getElementById('notes-list');
      if (!state.notes.length) {
        el.innerHTML = '<div class="empty-state">No notes yet — send the first one</div>';
        return;
      }
      el.innerHTML = state.notes.slice(0, 30).map(n =>
        `<div class="note-card">
          <div class="note-from">from ${n.from}</div>
          <div class="note-body">${n.text}</div>
          <div class="note-time">${fmt(n.ts)}</div>
        </div>`
      ).join('');
    }

    // init
    renderMoods();
    renderJournal();
    renderMilestones();
    renderNotes();
    setFrom(1);
  </script>
</body>
</html>
