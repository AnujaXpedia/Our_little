<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Little World</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
</head>
<body>

<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:#fafaf8;">
  <div style="background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:2.5rem 2rem;max-width:360px;width:100%;text-align:center;">
    <h1 style="font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;margin-bottom:6px;">our little world</h1>
    <p style="font-size:13px;color:#6b6b67;margin-bottom:2rem;">a quiet space for Ambika &amp; Anuja</p>
    <button id="google-btn" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;border:0.5px solid rgba(0,0,0,0.2);border-radius:10px;background:#f4f3f0;color:#1a1a18;font-size:14px;font-family:sans-serif;cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div id="login-msg" style="margin-top:1rem;font-size:13px;color:#a0a09c;display:none;">Redirecting to Google...</div>
    <div id="login-error" style="margin-top:1rem;font-size:12px;color:#c0392b;display:none;">Only Ambika &amp; Anuja can access this space.</div>
  </div>
</div>

<div id="app-screen" style="display:none;">
  <div style="max-width:700px;margin:0 auto;padding:2.5rem 1.25rem 4rem;">
    <div style="text-align:center;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:0.5px solid rgba(0,0,0,0.1);">
      <h1 style="font-family:'DM Serif Display',serif;font-size:32px;font-weight:400;">our little world</h1>
      <p style="font-size:13px;color:#a0a09c;margin-top:5px;">a quiet space for the two of you</p>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap;">
        <span id="today-date" style="font-size:12px;color:#6b6b67;background:#f4f3f0;padding:4px 12px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.1);"></span>
        <span id="user-chip" style="font-size:12px;color:#6b6b67;background:#f4f3f0;padding:4px 12px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.1);"></span>
        <button id="signout-btn" style="font-size:12px;color:#a0a09c;background:none;border:none;cursor:pointer;font-family:sans-serif;">sign out</button>
      </div>
    </div>
    <div style="display:flex;gap:4px;background:#f4f3f0;border-radius:14px;padding:4px;margin-bottom:2rem;border:0.5px solid rgba(0,0,0,0.1);">
      <button class="nav-btn active" data-tab="mood">Mood</button>
      <button class="nav-btn" data-tab="journal">Journal</button>
      <button class="nav-btn" data-tab="milestones">Growth</button>
      <button class="nav-btn" data-tab="notes">Love notes</button>
    </div>
    <div id="tab-mood" class="tab-section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;">
        <div class="card">
          <div style="font-size:15px;font-weight:500;margin-bottom:12px;">Ambika <span id="ambika-you" style="display:none;font-size:10px;color:#c9b99a;background:#f7f2ea;border:0.5px solid #c9b99a;border-radius:99px;padding:1px 8px;font-weight:400;">you</span></div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;" id="moods-ambika">
            <button class="emoji-btn" data-person="ambika" data-emoji="😊">😊</button>
            <button class="emoji-btn" data-person="ambika" data-emoji="😌">😌</button>
            <button class="emoji-btn" data-person="ambika" data-emoji="😔">😔</button>
            <button class="emoji-btn" data-person="ambika" data-emoji="😤">😤</button>
            <button class="emoji-btn" data-person="ambika" data-emoji="🥰">🥰</button>
            <button class="emoji-btn" data-person="ambika" data-emoji="😴">😴</button>
          </div>
          <input class="text-input" id="note-ambika" type="text" placeholder="One word about today..." />
        </div>
        <div class="card">
          <div style="font-size:15px;font-weight:500;margin-bottom:12px;">Anuja <span id="anuja-you" style="display:none;font-size:10px;color:#c9b99a;background:#f7f2ea;border:0.5px solid #c9b99a;border-radius:99px;padding:1px 8px;font-weight:400;">you</span></div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;" id="moods-anuja">
            <button class="emoji-btn" data-person="anuja" data-emoji="😊">😊</button>
            <button class="emoji-btn" data-person="anuja" data-emoji="😌">😌</button>
            <button class="emoji-btn" data-person="anuja" data-emoji="😔">😔</button>
            <button class="emoji-btn" data-person="anuja" data-emoji="😤">😤</button>
            <button class="emoji-btn" data-person="anuja" data-emoji="🥰">🥰</button>
            <button class="emoji-btn" data-person="anuja" data-emoji="😴">😴</button>
          </div>
          <input class="text-input" id="note-anuja" type="text" placeholder="One word about today..." />
        </div>
      </div>
      <button id="mood-save-btn" class="save-btn">Save today's mood</button>
      <div id="mood-history" style="margin-top:1.75rem;"></div>
    </div>
    <div id="tab-journal" class="tab-section" style="display:none;">
      <div class="card">
        <div class="card-label">What's on your mind lately?</div>
        <textarea class="text-input" id="journal-text" placeholder="Thoughts, feelings, things to explore together..."></textarea>
      </div>
      <div class="card">
        <div class="card-label">One thing to improve our relationship</div>
        <textarea class="text-input" id="improve-text" placeholder="A small habit, a conversation to have, something to try..."></textarea>
      </div>
      <button id="journal-save-btn" class="save-btn">Save entry</button>
      <div id="journal-past" style="margin-top:1.75rem;"></div>
    </div>
    <div id="tab-milestones" class="tab-section" style="display:none;">
      <div id="milestones-list"></div>
      <div style="display:flex;gap:8px;margin-top:6px;">
        <input class="text-input" id="milestone-input" type="text" placeholder="Add a growth goal or milestone..." style="flex:1;" />
        <button id="milestone-add-btn" style="padding:9px 18px;border:0.5px solid rgba(0,0,0,0.2);border-radius:10px;background:transparent;color:#1a1a18;font-size:13px;cursor:pointer;white-space:nowrap;">Add</button>
      </div>
    </div>
    <div id="tab-notes" class="tab-section" style="display:none;">
      <div class="card">
        <div class="card-label" id="note-to-label">To: —</div>
        <textarea class="text-input" id="note-text" placeholder="Something kind, appreciative, or just sweet..."></textarea>
        <div style="overflow:hidden;">
          <button id="send-note-btn" style="float:right;margin-top:10px;padding:10px 20px;border:0.5px solid rgba(0,0,0,0.2);border-radius:10px;background:transparent;color:#1a1a18;font-size:13px;cursor:pointer;">Send note ✉</button>
        </div>
      </div>
      <div id="notes-list"></div>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fafaf8;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:999;font-family:sans-serif;"></div>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#fafaf8;color:#1a1a18;}
  .card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:1rem;}
  .card-label{font-size:11px;color:#a0a09c;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;}
  .text-input{width:100%;font-size:13px;font-family:'DM Sans',sans-serif;color:#1a1a18;background:#f4f3f0;border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;padding:8px 11px;outline:none;}
  .text-input:focus{border-color:#c9b99a;}
  textarea.text-input{min-height:80px;resize:vertical;line-height:1.6;font-size:14px;}
  .save-btn{width:100%;padding:11px;border:0.5px solid rgba(0,0,0,0.2);border-radius:10px;background:transparent;color:#1a1a18;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;}
  .save-btn:disabled{opacity:0.5;cursor:default;}
  .nav-btn{flex:1;padding:9px 8px;border:none;border-radius:10px;background:transparent;color:#6b6b67;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
  .nav-btn.active{background:#fff;color:#1a1a18;font-weight:500;border:0.5px solid rgba(0,0,0,0.2);}
  .emoji-btn{width:36px;height:36px;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;background:#f4f3f0;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .emoji-btn.selected{border:1.5px solid #c9b99a;background:#f7f2ea;}
  .emoji-btn:disabled{opacity:0.4;cursor:default;}
  .history-label{font-size:12px;font-weight:500;color:#a0a09c;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;}
  .history-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);}
  .past-entry{border-left:1.5px solid #c9b99a;padding:6px 0 6px 14px;margin-bottom:14px;}
  .milestone-item{display:flex;align-items:flex-start;gap:12px;background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:12px 14px;margin-bottom:10px;cursor:pointer;}
  .milestone-item.done{opacity:0.6;}
  .m-check{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#5a8a5a;}
  .milestone-item.done .m-check{background:#edf5ed;border-color:#5a8a5a;}
  .milestone-item.done .m-text{text-decoration:line-through;color:#6b6b67;}
  .note-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
  .empty-state{text-align:center;padding:2.5rem 1rem;font-size:13px;color:#a0a09c;}
  @media(max-width:480px){#tab-mood>div:first-child{grid-template-columns:1fr!important;}}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL='https://dioxbtmvkonwgovpqdqx.supabase.co';
  const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpb3hidG12a29ud2dvdnBxZHF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2Nzg2MzcsImV4cCI6MjA5MDI1NDYzN30.7ZlAtTqpKvXWUNlTRwN4bcAB9V87eTfHaB-vNMXZKr0';
  const ALLOWED=['ambikabanerjee17@gmail.com','anuja4220@gmail.com'];
  const NAMES={'ambikabanerjee17@gmail.com':'Ambika','anuja4220@gmail.com':'Anuja'};
  const PARTNER={'ambikabanerjee17@gmail.com':'anuja4220@gmail.com','anuja4220@gmail.com':'ambikabanerjee17@gmail.com'};
  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}});
  let ME=null,MY_NAME='',MOOD_PICK={ambika:null,anuja:null};
  const $=id=>document.getElementById(id);
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(ts){const d=new Date(ts);return DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()];}
  function toast(msg){const t=$('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500);}
  function mySlug(){return ME.email==='ambikabanerjee17@gmail.com'?'ambika':'anuja';}

  $('google-btn').addEventListener('click',async()=>{
    $('google-btn').textContent='Redirecting...';
    $('google-btn').disabled=true;
    $('login-msg').style.display='block';
    const redirectTo=window.location.origin+window.location.pathname;
    const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo}});
    if(error){toast('Error: '+error.message);$('google-btn').textContent='Continue with Google';$('google-btn').disabled=false;$('login-msg').style.display='none';}
  });

  $('signout-btn').addEventListener('click',async()=>{await sb.auth.signOut();location.href=location.origin+location.pathname;});

  function handleUser(user){
    if(!user||!ALLOWED.includes(user.email)){if(user)sb.auth.signOut();return;}
    if(ME)return;
    ME=user;MY_NAME=NAMES[user.email];boot();
  }

  sb.auth.onAuthStateChange((_,session)=>handleUser(session?.user||null));
  sb.auth.getSession().then(({data:{session}})=>handleUser(session?.user||null));

  function boot(){
    $('login-screen').style.display='none';
    $('app-screen').style.display='block';
    $('today-date').textContent=fmtDate(Date.now());
    $('user-chip').textContent='hi, '+MY_NAME.toLowerCase();
    const isAmbika=ME.email==='ambikabanerjee17@gmail.com';
    $('ambika-you').style.display=isAmbika?'inline-block':'none';
    $('anuja-you').style.display=!isAmbika?'inline-block':'none';
    $('note-to-label').textContent='To: '+NAMES[PARTNER[ME.email]];
    const other=mySlug()==='ambika'?'anuja':'ambika';
    document.querySelectorAll('#moods-'+other+' .emoji-btn').forEach(b=>b.disabled=true);
    const oi=$('note-'+other);oi.disabled=true;oi.placeholder='waiting for '+NAMES[PARTNER[ME.email]]+'...';
    document.querySelectorAll('.nav-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-section').forEach(s=>s.style.display='none');
        btn.classList.add('active');$('tab-'+btn.dataset.tab).style.display='block';
      });
    });
    document.querySelectorAll('.emoji-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const p=btn.dataset.person;if(p!==mySlug())return;
        MOOD_PICK[p]=btn.dataset.emoji;
        document.querySelectorAll('#moods-'+p+' .emoji-btn').forEach(b=>b.classList.toggle('selected',b===btn));
      });
    });
    $('mood-save-btn').addEventListener('click',saveMood);
    $('journal-save-btn').addEventListener('click',saveJournal);
    $('milestone-add-btn').addEventListener('click',addMilestone);
    $('send-note-btn').addEventListener('click',sendNote);
    $('milestone-input').addEventListener('keydown',e=>{if(e.key==='Enter')addMilestone();});
    loadMoods();loadJournal();loadMilestones();loadNotes();
  }

  async function saveMood(){
    const me=mySlug();const btn=$('mood-save-btn');btn.disabled=true;btn.textContent='Saving...';
    const today=new Date().toISOString().split('T')[0];
    const{error}=await sb.from('moods').upsert({date:today,person:me,emoji:MOOD_PICK[me]||'–',note:$('note-'+me).value},{onConflict:'date,person'});
    btn.disabled=false;btn.textContent="Save today's mood";
    if(error){toast('Could not save.');return;}
    $('note-'+me).value='';MOOD_PICK[me]=null;
    document.querySelectorAll('#moods-'+me+' .emoji-btn').forEach(b=>b.classList.remove('selected'));
    toast('Mood saved!');loadMoods();
  }

  async function loadMoods(){
    const{data}=await sb.from('moods').select('*').order('date',{ascending:false}).limit(28);
    if(!data)return;
    const today=new Date().toISOString().split('T')[0];
    const other=mySlug()==='ambika'?'anuja':'ambika';
    const ot=data.find(d=>d.date===today&&d.person===other);
    if(ot){document.querySelectorAll('#moods-'+other+' .emoji-btn').forEach(b=>b.classList.toggle('selected',b.dataset.emoji===ot.emoji));$('note-'+other).value=ot.note||'';}
    const byDate={};data.forEach(d=>{if(!byDate[d.date])byDate[d.date]={};byDate[d.date][d.person]=d;});
    const dates=Object.keys(byDate).sort().reverse().slice(0,10);
    const el=$('mood-history');
    if(!dates.length){el.innerHTML='';return;}
    el.innerHTML='<div class="history-label">Recent days</div>'+dates.map(date=>{
      const a=byDate[date].ambika,n=byDate[date].anuja;
      return`<div class="history-row"><span style="min-width:60px;font-size:12px;color:#a0a09c;">${fmtDate(new Date(date+'T12:00:00'))}</span><span style="font-size:18px;">${a?.emoji||'–'}${n?.emoji||'–'}</span><span style="font-size:12px;color:#6b6b67;">${[a?.note,n?.note].filter(Boolean).join(' · ')}</span></div>`;
    }).join('');
  }

  async function saveJournal(){
    const t=$('journal-text').value.trim(),i=$('improve-text').value.trim();
    if(!t&&!i)return;
    const{error}=await sb.from('journal').insert({author:mySlug(),thoughts:t,improve:i});
    if(error){toast('Could not save.');return;}
    $('journal-text').value='';$('improve-text').value='';toast('Entry saved!');loadJournal();
  }

  async function loadJournal(){
    const{data}=await sb.from('journal').select('*').order('created_at',{ascending:false}).limit(10);
    if(!data)return;
    const el=$('journal-past');
    if(!data.length){el.innerHTML='';return;}
    el.innerHTML='<div class="history-label">Past entries</div>'+data.map(e=>
      `<div class="past-entry"><div style="font-size:11px;color:#a0a09c;margin-bottom:4px;">${fmtDate(new Date(e.created_at))} · ${e.author==='ambika'?'Ambika':'Anuja'}</div>${e.thoughts?`<div style="font-size:13px;color:#6b6b67;line-height:1.65;">${e.thoughts}</div>`:''}${e.improve?`<div style="font-size:12px;color:#a0a09c;margin-top:4px;font-style:italic;">To improve: ${e.improve}</div>`:''}</div>`
    ).join('');
  }

  async function addMilestone(){
    const val=$('milestone-input').value.trim();if(!val)return;
    const{error}=await sb.from('milestones').insert({text:val,done:false,added_by:mySlug()});
    if(error){toast('Could not add.');return;}
    $('milestone-input').value='';loadMilestones();
  }

  async function toggleMilestone(id,current){
    await sb.from('milestones').update({done:!current}).eq('id',id);loadMilestones();
  }

  async function loadMilestones(){
    const{data}=await sb.from('milestones').select('*').order('created_at',{ascending:true});
    if(!data)return;
    const el=$('milestones-list');
    if(!data.length){el.innerHTML='<div class="empty-state">No goals yet — add your first one below</div>';return;}
    el.innerHTML=data.map(m=>`<div class="milestone-item ${m.done?'done':''}" onclick="toggleMilestone(${m.id},${m.done})"><div class="m-check">${m.done?'✓':''}</div><div class="m-text" style="font-size:14px;">${m.text}</div></div>`).join('');
  }

  async function sendNote(){
    const text=$('note-text').value.trim();if(!text)return;
    const btn=$('send-note-btn');btn.disabled=true;btn.textContent='Sending...';
    const toEmail=PARTNER[ME.email];
    const{error}=await sb.from('notes').insert({from_person:mySlug(),from_name:MY_NAME,to_email:toEmail,message:text});
    if(error){toast('Could not send.');btn.disabled=false;btn.textContent='Send note ✉';return;}
    try{await sb.functions.invoke('send-note-email',{body:{fromName:MY_NAME,toEmail,message:text}});}catch(e){}
    $('note-text').value='';btn.disabled=false;btn.textContent='Send note ✉';
    toast('Note sent to '+NAMES[toEmail]+'! 💌');loadNotes();
  }

  async function loadNotes(){
    const{data}=await sb.from('notes').select('*').order('created_at',{ascending:false}).limit(30);
    if(!data)return;
    const el=$('notes-list');
    if(!data.length){el.innerHTML='<div class="empty-state">No notes yet — send the first one</div>';return;}
    el.innerHTML=data.map(n=>`<div class="note-card"><div style="font-size:11px;color:#a0a09c;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;">from ${n.from_name}</div><div style="font-family:'DM Serif Display',serif;font-size:15px;color:#1a1a18;line-height:1.75;">${n.message}</div><div style="font-size:11px;color:#a0a09c;margin-top:9px;">${fmtDate(new Date(n.created_at))}</div></div>`).join('');
  }
</script>
</body>
</html>
