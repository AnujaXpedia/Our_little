<script>
  const SUPABASE_URL = 'https://dioxbtmvkonwgovpqdqx.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';

  const ALLOWED_EMAILS = ['ambikabanerjee17@gmail.com', 'anuja4220@gmail.com'];

  const NAMES = {
    'ambikabanerjee17@gmail.com': 'Ambika',
    'anuja4220@gmail.com': 'Anuja'
  };

  const PARTNER_EMAIL = {
    'ambikabanerjee17@gmail.com': 'anuja4220@gmail.com',
    'anuja4220@gmail.com': 'ambikabanerjee17@gmail.com'
  };

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentName = '';

  // =========================
  // GOOGLE LOGIN (FIXED)
  // =========================
  async function signInWithGoogle() {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin
      }
    });

    if (error) {
      console.error("Login error:", error);
      showToast('Login failed. Check console.');
    }
  }

  async function signOut() {
    await supabase.auth.signOut();
    location.reload();
  }

  supabase.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      const email = session.user.email;

      if (!ALLOWED_EMAILS.includes(email)) {
        document.getElementById('login-error').style.display = 'block';
        await supabase.auth.signOut();
        return;
      }

      currentUser = session.user;
      currentName = NAMES[email];
      initApp();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  function initApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';

    document.getElementById('user-chip').textContent =
      'hi, ' + currentName.toLowerCase();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function mySlug() {
    return currentUser.email === 'ambikabanerjee17@gmail.com'
      ? 'ambika'
      : 'anuja';
  }

  // =========================
  // SEND NOTE (FIXED)
  // =========================
  async function sendNote() {
    const text = document.getElementById('note-text').value.trim();
    if (!text) return;

    const btn = document.getElementById('send-note-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    const toEmail = PARTNER_EMAIL[currentUser.email];
    const fromName = currentName;

    // Save in DB
    const { error } = await supabase.from('notes').insert({
      from_person: mySlug(),
      from_name: fromName,
      to_email: toEmail,
      message: text
    });

    if (error) {
      console.error("DB error:", error);
      showToast('Could not send.');
      btn.disabled = false;
      btn.textContent = 'Send note ✉';
      return;
    }

    // Call Edge Function (with proper error handling)
    const { data, error: fnError } =
      await supabase.functions.invoke('send-note-email', {
        body: { fromName, toEmail, message: text }
      });

    if (fnError) {
      console.error("Function error:", fnError);
      showToast("Saved, but email failed");
    } else {
      console.log("Email sent:", data);
    }

    document.getElementById('note-text').value = '';
    btn.disabled = false;
    btn.textContent = 'Send note ✉';

    showToast('Note sent 💌');
  }
</script>
